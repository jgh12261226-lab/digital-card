<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디지털 명함</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #1a1a2e, #16213e, #0f3460);
            overflow: hidden;
            color: #ffffff;
        }

        /* 배경 장식 요소 (은은한 그라데이션 원형) */
        .bg-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
        }

        .blob-1 { top: 10%; left: 15%; }
        .blob-2 { bottom: 10%; right: 15%; background: linear-gradient(135deg, #00c6fb 0%, #005bea 100%); }

        /* 글래스모피즘 카드 스타일 */
        .card {
            position: relative;
            width: 350px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            cursor: pointer;
        }

        /* 마우스 호버 효과 */
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.5);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* 프로필 이미지 영역 */
        .profile-img {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            border-radius: 50%;
            background: linear-gradient(45deg, #3a3a3a, #1a1a1a);
            border: 3px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            overflow: hidden;
            position: relative;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 텍스트 스타일 */
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .info-container {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .email {
            font-size: 14px;
            color: #00d2ff;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s ease;
        }

        .email:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* SNS 아이콘 (장식용) */
        .social-links {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
        }

    </style>
</head>
<body>

    <!-- 배경 장식 -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <!-- 명함 카드 -->
    <div class="card">
        <div class="profile-img">
            <!-- 이미지가 없을 경우를 대비한 아이콘 혹은 플레이스홀더 -->
            <span>👤</span>
            <!-- 실제 이미지를 넣으려면 아래 주석을 해제하세요 -->
            <img src="profile.png" alt="Profile Image" onerror="this.style.display='none'">
        </div>

        <h1>Joen ji hun</h1>
        <p class="tagline">끊임없이 배우고 성장하는<br>프론트엔드 개발자입니다.</p>

        <div class="info-container">
            <a href="mailto:example@email.com" class="email">
                📧 jgh12261226@gmail.com
            </a>
        </div>

        <div class="social-links">
            <div class="social-dot" style="background: #1DA1F2;"></div>
            <div class="social-dot" style="background: #E4405F;"></div>
            <div class="social-dot" style="background: #ffffff;"></div>
        </div>
    </div>

</body>
</html>
